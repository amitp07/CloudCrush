# define minio deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio 
          image: minio/minio
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          envs:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
            - containerPort: 9001

---
# define minio svc
apiVersion: v1
kind: Service
metadata:
  name: minio-svc
spec:
  selector:
    app: minio
  type: NodePort
  ports:
    - targetPort: 9000
      port: 9000
      name: api
    - targetPort: 9001
      port: 9001
      name: console
      

        



